site_name: Book Progress Dashboard
site_description: A React-based dashboard for tracking book-writing progress
site_author: Dan McCreary
docs_dir: docs

theme:
  name: material
  features:
    - navigation.top
    - toc.follow
    - content.code.copy

markdown_extensions:
  - attr_list
  - md_in_html
  - admonition
  - pymdownx.details
  - pymdownx.superfences

nav:
  - Home: index.md
  - Dashboard: dashboard/book-dashboard.html

extra:
  schema: https://dmccreary.github.io/intelligent-textbooks/ns/textbook/v1
